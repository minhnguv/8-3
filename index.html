```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Mừng 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff3b7f;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#ff1e6b;
}

#message{
    display:none;
    margin-top:20px;
}

h1{
    color:#ff3b7f;
}

</style>
</head>

<body>

<div class="box">

<h2>🔒 Nhập mật khẩu để mở lời chúc 8/3</h2>

<input type="password" id="password" placeholder="Nhập mật khẩu...">
<br>
<button onclick="checkPass()">Mở quà 🎁</button>

<div id="message">
<h1>🌸 Chúc Mừng 8/3 🌸</h1>

<p>
Chúc bạn luôn xinh đẹp như những đóa hoa 🌷  
Luôn hạnh phúc, vui vẻ và gặp thật nhiều may mắn.  

Mong rằng mỗi ngày của bạn đều tràn đầy nụ cười  
và những điều tuyệt vời nhất trong cuộc sống. 💖
</p>

</div>

</div>

<script>

function checkPass(){
    let pass = document.getElementById("password").value;

    if(pass === "0803"){
        document.getElementById("message").style.display = "block";
    }else{
        alert("Sai mật khẩu rồi 😝");
    }

}

</script>

</body>
</html>
```
