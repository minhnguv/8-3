<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
overflow:hidden;
background:linear-gradient(270deg,#ff9a9e,#fad0c4,#ffd1ff,#ff9a9e);
background-size:600% 600%;
animation:bgMove 12s infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
max-width:520px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff3b7f;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.15);
background:#ff1e6b;
}

h1{
color:#ff3b7f;
}

#message{
display:none;
margin-top:20px;
font-size:18px;
}

.flowerImg{
width:100%;
max-width:350px;
border-radius:15px;
margin:15px 0;
animation:floatImg 4s ease-in-out infinite;
}

@keyframes floatImg{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.fall{
position:fixed;
top:-30px;
font-size:26px;
animation:fall linear;
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

.firework{
position:fixed;
width:6px;
height:6px;
background:red;
border-radius:50%;
animation:explode 1s linear forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(15);opacity:0;}
}

</style>

</head>

<body>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="box">

<h2>🔒 Nhập mật khẩu để mở lời chúc 8/3</h2>

<input type="password" id="password" placeholder="Nhập mật khẩu...">
<br>
<button onclick="checkPass()">Mở quà 🎁</button>

<div id="message">

<h1>🌸 Chúc Mừng 8/3 🌸</h1>

<img class="flowerImg" src="https://cdn2.fptshop.com.vn/unsafe/Uploads/images/tin-tuc/180427/Originals/happy%20women's%20day%20nghi%CC%83a%20la%20gi%CC%80%202.jpeg">

<p id="text"></p>

</div>

</div>

<script>

function checkPass(){

let pass=document.getElementById("password").value;

if(pass==="0803"){

document.getElementById("message").style.display="block";

startTyping();
fireworks();

}else{

alert("Sai mật khẩu rồi 😝");

}

}

let msg="Chúc mừng ngày 8/3 đến tất cả những người phụ nữ tuyệt vời! Mong rằng hôm nay bạn sẽ nhận được thật nhiều hoa, nhiều quà và hơn hết là nhận được sự thấu hiểu từ những người thân yêu. Chúc bạn luôn xinh đẹp, chill và mạnh mẽ trong cuộc sống. Hãy luôn là phiên bản hạnh phúc nhất của chính mình nhé.";

let i=0;

function startTyping(){

function typing(){

if(i<msg.length){

document.getElementById("text").innerHTML+=msg.charAt(i);

i++;

setTimeout(typing,40);

}

}

typing();

}

function createFall(){

const el=document.createElement("div");

el.classList.add("fall");

let icons=["❤️","🌸","💖","🌺"];

el.innerHTML=icons[Math.floor(Math.random()*icons.length)];

el.style.left=Math.random()*100+"vw";

el.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(el);

setTimeout(()=>el.remove(),6000);

}

setInterval(createFall,300);

function fireworks(){

for(let i=0;i<30;i++){

let f=document.createElement("div");

f.classList.add("firework");

f.style.left=Math.random()*100+"vw";

f.style.top=Math.random()*80+"vh";

f.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

</script>

</body>
</html>
